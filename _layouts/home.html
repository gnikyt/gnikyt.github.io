---
layout: default
---

{{ content }}

{%- assign posts = site.posts -%}
{%- if posts.size > 0 -%}
    <ul>
        {%- for post in posts -%}
            <li>
                <h3>
                    <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
                </h3>
                <span><time datetime="{{ post.date | date: "%Y-%m-%d" }}">{{ post.date | date_to_string | date: "%b %-d, %Y" }}</time></span>
            </li>
        {%- endfor -%}
    </ul>
{%- endif -%}
