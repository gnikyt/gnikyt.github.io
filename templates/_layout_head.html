<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  {{#IS_PAGE}}{{>templates/_seo_default.html}}{{/IS_PAGE}}
  {{#IS_POST}}{{>templates/_seo_post.html}}{{/IS_POST}}

  <link rel="preload" as="font" href="/assets/fonts/RobotoMono-Regular.woff2" type="font/woff2" crossorigin="anonymous" />
  <link rel="preload" as="font" href="/assets/fonts/RobotoMono-Bold.woff2" type="font/woff2" crossorigin="anonymous" />
  <link rel="preload" as="font" href="/assets/fonts/RobotoMono-Light.woff2" type="font/woff2" crossorigin="anonymous" />
  <link rel="shortcut icon" href="/assets/images/favicon.ico" type="image/x-icon" />
  <link rel="icon" href="/assets/images/favicon.png" sizes="32x32" type="image/png" />
  <link rel="alternate" type="application/rss+xml" title="gnikyt feed" href="/rss.xml" />
  <link rel="stylesheet" href="/assets/styles/style.css" />
  <link rel="stylesheet" href="/assets/styles/highlight.css" />
  <script>
    try {
      if (localStorage.getItem("theme") === "day") {
        document.documentElement.dataset.theme = "day";
      }
    } catch {}
  </script>
</head>
<body class="layout layout--{{#IS_POST}}post{{/IS_POST}}{{#IS_PAGE}}page{{/IS_PAGE}} theme-shell" data-handle="{{HANDLE}}">
  <header class="site-head container">
    <div class="site-head__item">
      <div class="site-head__title">
        <div class="site-head__title-inner">
          <span class="site-head__title-item"><a href="/" class="site-head__link">gnikyt</a></span>
          <span class="site-head__title-item site-head__title-item--tag"><span>&nbsp;&nbsp;</span>/&nbsp;&nbsp;Code ramblings</span>
        </div>
        <div class="site-head__title-inner">
          <a href="/about" class="site-head__avatar">
            <img src="/assets/images/me.jpg" alt="Ty King" class="site-head__avatar-img" />
          </a>
        </div>
      </div>
      <nav class="site-nav" aria-label="Site navigation">
        <a href="/about" class="button button--strong button--ember">About</a><a href="https://github.com/gnikyt" target="_blank" rel="noopener" class="button button--strong button--moss">Github</a><a href="https://linkedin.com/in/gnikyt" target="_blank" rel="noopener" class="button button--strong button--slate">LinkedIn</a><a href="/assets/files/cv.pdf" target="_blank" rel="noopener" class="button button--strong button--gold">CV</a><a href="/rss.xml" target="_blank" rel="noopener" class="button button--strong button--paper">RSS</a><button type="button" class="theme-toggle" aria-label="Switch to day theme" aria-pressed="false">
          <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3.5"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41"></path>
          </svg>
          <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.5 15.25A8.5 8.5 0 0 1 8.75 3.5a8.5 8.5 0 1 0 11.75 11.75Z"></path>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="container">
